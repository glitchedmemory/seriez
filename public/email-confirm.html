<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">
<title>Confirm your email — Seriez</title>
</head>
<body style="margin:0;padding:0;background-color:#0f0f1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0f1a">
  <tr>
    <td align="center" style="padding:40px 20px">

      <!-- Logo -->
      <table role="presentation" cellpadding="0" cellspacing="0" style="margin-bottom:32px">
        <tr>
          <td align="center">
            <img src="https://seriez.app/email-logo.png"
                 alt="Seriez"
                 width="44"
                 style="display:block;width:44px;height:auto;border:0;outline:0">
          </td>
        </tr>
      </table>

      <!-- Card -->
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px">
        <tr>
          <td style="background-color:#1a1a2e;border-radius:16px;padding:40px 32px;border:1px solid #2a2a45">

            <!-- Welcome -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td style="padding-bottom:12px">
                  <h1 style="margin:0;font-size:24px;font-weight:700;color:#ffffff;line-height:1.3;text-align:center">
                    Welcome to Seriez
                  </h1>
                </td>
              </tr>
              <tr>
                <td style="padding-bottom:28px">
                  <p style="margin:0;font-size:15px;color:#9ca3af;line-height:1.6;text-align:center">
                    One click and you're in. Start tracking everything you watch.
                  </p>
                </td>
              </tr>

              <!-- CTA Button -->
              <tr>
                <td align="center" style="padding-bottom:28px">
                  <a href="{{ .ConfirmationURL }}"
                     target="_blank"
                     style="display:inline-block;background-color:#6366f1;color:#ffffff;font-size:15px;font-weight:600;padding:14px 36px;border-radius:12px;text-decoration:none;text-align:center">
                    Confirm your email
                  </a>
                </td>
              </tr>

              <!-- Divider -->
              <tr>
                <td style="padding-bottom:20px">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="border-top:1px solid #2a2a45;height:0;line-height:0;font-size:0"></td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Fallback link -->
              <tr>
                <td style="padding-bottom:4px">
                  <p style="margin:0;font-size:12px;color:#6b7280;line-height:1.5;text-align:center">
                    Button not working? Copy and paste this link:
                  </p>
                </td>
              </tr>
              <tr>
                <td>
                  <p style="margin:0;font-size:12px;color:#6366f1;line-height:1.5;text-align:center;word-break:break-all">
                    {{ .ConfirmationURL }}
                  </p>
                </td>
              </tr>
            </table>

          </td>
        </tr>
      </table>

      <!-- Footer -->
      <table role="presentation" cellpadding="0" cellspacing="0" style="margin-top:24px">
        <tr>
          <td align="center">
            <p style="margin:0;font-size:11px;color:#4b5563;line-height:1.5">
              If you didn't create this account, you can ignore this email.
            </p>
          </td>
        </tr>
      </table>

    </td>
  </tr>
</table>
</body>
</html>
