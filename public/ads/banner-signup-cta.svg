<svg width="320" height="100" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08081a"/>
      <stop offset="40%" stop-color="#0f0f28"/>
      <stop offset="100%" stop-color="#141435"/>
    </linearGradient>
    <!-- Accent shapes -->
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="accent2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="poster1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="poster2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="poster3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#701a75"/>
      <stop offset="100%" stop-color="#4a044e"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <!-- Film grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="grainBlend"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="320" height="100" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <!-- Card -->
  <g clip-path="url(#cardClip)">
    <!-- Background -->
    <rect x="0" y="0" width="320" height="100" fill="url(#bgGrad)"/>

    <!-- Accent blob shapes -->
    <ellipse cx="280" cy="20" rx="120" ry="80" fill="url(#accent1)" opacity="0.3"/>
    <ellipse cx="60" cy="80" rx="100" ry="60" fill="url(#accent2)" opacity="0.25"/>
    
    <!-- Abstract flowing shape -->
    <path d="M200 0 Q250 30 280 50 Q310 70 320 80 L320 100 L180 100 Q150 70 200 0Z" fill="#14b8a6" opacity="0.06"/>
    <path d="M0 60 Q40 40 80 50 Q120 60 140 80 L140 100 L0 100Z" fill="#6366f1" opacity="0.08"/>

    <!-- Overlapping poster cards -->
    <g transform="translate(6, 8) rotate(-6)">
      <rect x="0" y="0" width="28" height="42" rx="3" fill="url(#poster1)" stroke="#4c4a8a" stroke-width="0.3" opacity="0.85"/>
      <!-- Film strip holes -->
      <rect x="6" y="4" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="19" y="4" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="6" y="12" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="19" y="12" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="6" y="20" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="19" y="20" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <!-- Play triangle -->
      <polygon points="16,32 22,36 16,40" fill="#fff" opacity="0.15" transform="translate(0, 2)"/>
    </g>

    <g transform="translate(18, 5) rotate(3)">
      <rect x="0" y="0" width="28" height="42" rx="3" fill="url(#poster2)" stroke="#2d8a7a" stroke-width="0.3" opacity="0.8"/>
      <rect x="6" y="4" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="19" y="4" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="6" y="14" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="19" y="14" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="6" y="24" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="19" y="24" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <polygon points="16,32 22,36 16,40" fill="#fff" opacity="0.12"/>
    </g>

    <g transform="translate(30, 12) rotate(10)">
      <rect x="0" y="0" width="28" height="42" rx="3" fill="url(#poster3)" stroke="#6b2d6e" stroke-width="0.3" opacity="0.75"/>
      <rect x="6" y="4" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="19" y="4" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="6" y="14" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="19" y="14" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="6" y="24" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <rect x="19" y="24" width="3" height="3" rx="1" fill="#0f0f28" opacity="0.5"/>
      <polygon points="16,32 22,36 16,40" fill="#fff" opacity="0.1"/>
    </g>

    <!-- Decorative film strip dots left -->
    <circle cx="2" cy="20" r="2" fill="#14b8a6" opacity="0.15"/>
    <circle cx="2" cy="35" r="2" fill="#14b8a6" opacity="0.1"/>
    <circle cx="2" cy="50" r="2" fill="#14b8a6" opacity="0.15"/>
    <circle cx="2" cy="65" r="2" fill="#14b8a6" opacity="0.1"/>
    <circle cx="2" cy="80" r="2" fill="#14b8a6" opacity="0.08"/>

    <!-- Rating stars animation hint -->
    <text x="82" y="28" font-size="7" fill="#fbbf24" opacity="0.7">★★★★★</text>
    <text x="82" y="38" font-size="6.5" fill="#9ca3af" opacity="0.5">8.5 · trending now</text>

    <!-- Headline -->
    <text x="82" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#f3f4f6" letter-spacing="-0.1">
      Movies &amp; TV, your way
    </text>
    <text x="82" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="700" fill="#14b8a6" filter="url(#glow)" letter-spacing="-0.1">
      ✦ Personalized "For You"
    </text>

    <!-- CTA -->
    <g transform="translate(212, 64)">
      <rect x="0" y="0" width="90" height="28" rx="14" fill="url(#ctaGrad)" opacity="0.95"/>
      <rect x="0" y="0" width="90" height="10" rx="14" fill="#fff" opacity="0.12"/>
      <text x="45" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="0.3">
        Sign Up →
      </text>
    </g>

    <!-- Bottom tagline -->
    <text x="82" y="93" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#6b7280" letter-spacing="0.2">
      Track · Rate · Discover · No ads, ever
    </text>

    <!-- Tiny decorative stars -->
    <text x="74" y="22" font-size="4" fill="#fbbf24" opacity="0.3">✦</text>
    <text x="90" y="18" font-size="3" fill="#fbbf24" opacity="0.2">✦</text>
  </g>

  <!-- Card border -->
  <rect x="0.5" y="0.5" width="319" height="99" rx="9.5" ry="9.5" fill="none" stroke="#2a2a48" stroke-width="0.5"/>
</svg>
