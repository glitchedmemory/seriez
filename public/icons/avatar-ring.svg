<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#5eead4" stroke-width="14" opacity="0.25" filter="url(#glowFilter)"/>
  <!-- Main ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#14b8a6" stroke-width="7" opacity="0.85"/>
</svg>