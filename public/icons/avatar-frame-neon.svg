<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="tealGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0"/>
      <stop offset="60%" stop-color="#14b8a6" stop-opacity="0.05"/>
      <stop offset="76%" stop-color="#2dd4bf" stop-opacity="0.5"/>
      <stop offset="82%" stop-color="#5eead4" stop-opacity="1"/>
      <stop offset="88%" stop-color="#14b8a6" stop-opacity="0.8"/>
      <stop offset="94%" stop-color="#0f766e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="103" fill="url(#tealGlow)" filter="url(#glowFilter)"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#5eead4" stroke-width="2" opacity="0.9"/>
  <circle cx="100" cy="100" r="70" fill="none"/>
</svg>
