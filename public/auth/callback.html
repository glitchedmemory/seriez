<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Verifying...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body style="background:#050508;color:#f1f5f9;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0">
<p id="msg" style="font-size:16px">Verifying your email...</p>
<script>
(async function() {
  var msg = document.getElementById('msg');
  var sb = supabase.createClient(
    'https://zntyjtjodyzizoafxord.supabase.co',
    'sb_publishable_6_O4sP7ZZBT4wxHMVwVtGg_rIgRD1NH'
  );

  // Try ?code= query param first (new flow)
  var qp = new URLSearchParams(window.location.search);
  var code = qp.get('code');
  
  if (code) {
    var res = await sb.auth.exchangeCodeForSession(code);
    if (res.error || !res.data.user) {
      msg.textContent = 'Error: ' + (res.error ? res.error.message : 'no user') + 
        ' | code=' + code.substring(0,8) + '... | status=' + (res.error ? res.error.status : 'N/A');
      console.log('exchangeCodeForSession error:', JSON.stringify(res.error));
      return;
    }
    // Save username
    try {
      var ud = await sb.from('users').select('username').eq('id', res.data.user.id).single();
      if (ud.data && ud.data.username) {
        localStorage.setItem('seriez-username', ud.data.username);
        document.cookie = 'seriez-username='+ud.data.username+';path=/;max-age=31536000;SameSite=Lax;secure';
      }
    } catch(e) {}
    window.location.replace('/');
    return;
  }

  // Fallback: try #access_token= hash
  var hash = window.location.hash;
  if (hash && hash.length > 10) {
    var hp = new URLSearchParams(hash.substring(1));
    var at = hp.get('access_token');
    var rt = hp.get('refresh_token');
    if (at && rt) {
      var res = await sb.auth.setSession({access_token:at, refresh_token:rt});
      if (res.error || !res.data.user) {
        msg.textContent = 'Could not verify. Please try signing up again.';
        return;
      }
      try {
        var ud = await sb.from('users').select('username').eq('id', res.data.user.id).single();
        if (ud.data && ud.data.username) {
          localStorage.setItem('seriez-username', ud.data.username);
          document.cookie = 'seriez-username='+ud.data.username+';path=/;max-age=31536000;SameSite=Lax;secure';
        }
      } catch(e) {}
      window.location.replace('/');
      return;
    }
  }

  msg.textContent = 'Could not verify. Please try signing up again.';
})();
</script>
</body>
</html>
