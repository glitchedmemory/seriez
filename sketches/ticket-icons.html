<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seriez · Ring → Dot → Sparkle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a14; color: #e0e0e0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .page {
    background: #141428;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    border: 1px solid #1e1e3a;
    max-width: 560px; width: 100%;
  }

  .poster {
    width: 100%; aspect-ratio: 16/9;
    background: linear-gradient(135deg, #0d1b2a 0%, #1a1a3e 100%);
    border-radius: 14px; margin-bottom: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    border: 2px solid #1e1e3a;
  }

  .title-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: .2rem; }
  .title { font-size: 1.3rem; font-weight: 700; color: #f0f0f0; }
  .year { font-size: .85rem; color: #6b7280; }
  .meta { font-size: .72rem; color: #5b6270; margin-bottom: 1.8rem; letter-spacing: .02em; }

  .tickets { display: flex; gap: 12px; justify-content: center; }

  .ticket-wrap {
    flex: 1; max-width: 155px;
    cursor: pointer;
    transition: all .35s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .ticket-wrap.active { transform: rotate(-1.5deg) translateY(-4px); z-index: 2; }

  .ticket-inner { background: #1f1f38; border-radius: 0 0 8px 8px; transition: all .35s; }
  .ticket-wrap.active .ticket-inner { background: #1a2a32; box-shadow: 0 0 40px rgba(13,148,136,.25); }

  .perf-top {
    height: 12px;
    background:
      radial-gradient(circle at 6px 6px, #141428 5px, transparent 5px),
      radial-gradient(circle at 22px 6px, #141428 5px, transparent 5px),
      radial-gradient(circle at 38px 6px, #141428 5px, transparent 5px),
      radial-gradient(circle at 54px 6px, #141428 5px, transparent 5px),
      radial-gradient(circle at 70px 6px, #141428 5px, transparent 5px),
      radial-gradient(circle at 86px 6px, #141428 5px, transparent 5px),
      radial-gradient(circle at 102px 6px, #141428 5px, transparent 5px),
      radial-gradient(circle at 118px 6px, #141428 5px, transparent 5px),
      radial-gradient(circle at 134px 6px, #141428 5px, transparent 5px);
    background-size: 150px 12px; margin-bottom: -2px;
  }

  .perf-bottom {
    margin-top: -2px; height: 12px;
    background:
      radial-gradient(circle at 6px 6px, #0a0a14 5px, transparent 5px),
      radial-gradient(circle at 22px 6px, #0a0a14 5px, transparent 5px),
      radial-gradient(circle at 38px 6px, #0a0a14 5px, transparent 5px),
      radial-gradient(circle at 54px 6px, #0a0a14 5px, transparent 5px),
      radial-gradient(circle at 70px 6px, #0a0a14 5px, transparent 5px),
      radial-gradient(circle at 86px 6px, #0a0a14 5px, transparent 5px),
      radial-gradient(circle at 102px 6px, #0a0a14 5px, transparent 5px),
      radial-gradient(circle at 118px 6px, #0a0a14 5px, transparent 5px),
      radial-gradient(circle at 134px 6px, #0a0a14 5px, transparent 5px);
    background-size: 150px 12px; position: relative;
  }
  .ticket-wrap.active .perf-bottom::before {
    content: '';
    display: block; height: 12px;
    background:
      radial-gradient(circle at 6px 6px, rgba(13,148,136,.4) 5px, transparent 5px),
      radial-gradient(circle at 22px 6px, rgba(13,148,136,.4) 5px, transparent 5px),
      radial-gradient(circle at 38px 6px, rgba(13,148,136,.4) 5px, transparent 5px),
      radial-gradient(circle at 54px 6px, rgba(13,148,136,.4) 5px, transparent 5px),
      radial-gradient(circle at 70px 6px, rgba(13,148,136,.4) 5px, transparent 5px),
      radial-gradient(circle at 86px 6px, rgba(13,148,136,.4) 5px, transparent 5px),
      radial-gradient(circle at 102px 6px, rgba(13,148,136,.4) 5px, transparent 5px),
      radial-gradient(circle at 118px 6px, rgba(13,148,136,.4) 5px, transparent 5px),
      radial-gradient(circle at 134px 6px, rgba(13,148,136,.4) 5px, transparent 5px);
    background-size: 150px 12px; position: absolute; top:0; left:0; right:0;
  }

  .ticket-content {
    padding: 10px 12px 8px;
    display: flex; flex-direction: column; align-items: center;
    border-left:1px solid #2d2d4a; border-right:1px solid #2d2d4a;
    transition:all .35s;
  }
  .ticket-wrap.active .ticket-content{border-color:rgba(13,148,136,.4)}

  .ticket-no {
    font-family:'Courier Prime',monospace;
    font-size:.38rem;color:#3a3a50;letter-spacing:.04em;margin-bottom:6px;transition:color .35s
  }
  .ticket-wrap.active .ticket-no{color:#0d9488}

  .ticket-action {
    font-family:'Courier Prime',monospace;
    font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
    color:#4a4a6a;transition:color .35s;margin-bottom:2px
  }

  .ticket-icon {
    width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:#1a1a30;border:2px solid #2a2a42;
    transition:all .4s cubic-bezier(.4,0,.2,1.2);margin:4px 0
  }
  .ticket-icon svg{width:24px;height:24px}
  .ticket-wrap.active .ticket-icon{
    background:linear-gradient(135deg,#0d9488,#0f766e);
    border-color:#0d9488;box-shadow:0 0 20px rgba(13,148,136,.35)
  }

  .ticket-meta{display:flex;gap:12px;font-family:'Courier Prime',monospace;font-size:.42rem;color:#3a3a50;letter-spacing:.03em;transition:color .35s;margin-top:4px}
  .ticket-wrap.active .ticket-meta{color:#0d9488}

  .barcode{display:flex;gap:1px;justify-content:center;margin-top:6px;padding:4px 0;opacity:.15;transition:opacity .35s}
  .ticket-wrap.active .barcode{opacity:.4}
  .barcode span{display:block;width:1.5px;background:currentColor}

  .info{margin-top:1.5rem;text-align:center;font-size:.62rem;color:#5b6270;font-style:italic}
  .info em{color:#0d9488;font-style:normal}
</style>
</head>
<body>
<div class="page">
  <div class="poster">🎬</div>
  <div class="title-row"><span class="title">The Dark Knight</span><span class="year">2008</span></div>
  <div class="meta">Action · Crime · Drama · 2h 32m</div>

  <div class="tickets" id="tickets">

    <!-- To Watch — empty open ring: waiting -->
    <div class="ticket-wrap" onclick="stamp(this,0)">
      <div class="ticket-inner">
        <div class="perf-top"></div>
        <div class="ticket-content">
          <div class="ticket-no">No 00421</div>
          <div class="ticket-action">To Watch</div>
          <div class="ticket-icon">
            <svg viewBox="0 0 32 32" fill="none" stroke="#4a4a6a" stroke-width="2" stroke-linecap="round">
              <circle cx="16" cy="16" r="8"/>
              <path d="M8 16h16" opacity="0"/>
            </svg>
          </div>
          <div class="ticket-meta"><span>Row G</span><span>Seat 12</span></div>
          <div class="barcode" id="bc0"></div>
        </div>
        <div class="perf-bottom"></div>
      </div>
    </div>

    <!-- Watching — filled dot: engaged -->
    <div class="ticket-wrap" onclick="stamp(this,1)">
      <div class="ticket-inner" style="background:#241f3a">
        <div class="perf-top"></div>
        <div class="ticket-content" style="border-color:rgba(99,102,241,.3)">
          <div class="ticket-no" style="color:#6366f1">No 00421</div>
          <div class="ticket-action" style="color:#a5b4fc">Watching</div>
          <div class="ticket-icon" style="background:linear-gradient(135deg,#4c3a7a,#3a2a5a);border-color:#6366f1">
            <svg viewBox="0 0 32 32" fill="#c4b5fd" stroke="#c4b5fd" stroke-width="2">
              <circle cx="16" cy="16" r="7"/>
            </svg>
          </div>
          <div class="ticket-meta" style="color:#818cf8"><span>Row G</span><span>Seat 12</span></div>
          <div class="barcode" id="bc1" style="opacity:.25;color:#6366f1"></div>
        </div>
        <div class="perf-bottom"></div>
      </div>
    </div>

    <!-- Watched — sparkle: complete (user approved) -->
    <div class="ticket-wrap active" onclick="stamp(this,2)">
      <div class="ticket-inner">
        <div class="perf-top"></div>
        <div class="ticket-content">
          <div class="ticket-no">No 00421</div>
          <div class="ticket-action">Watched</div>
          <div class="ticket-icon">
            <svg viewBox="0 0 32 32" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="16" cy="16" r="11" opacity=".15"/>
              <path d="M16 7l2 6 6 2-6 2-2 6-2-6-6-2 6-2z"/>
            </svg>
          </div>
          <div class="ticket-meta"><span>Row G</span><span>Seat 12</span></div>
          <div class="barcode" id="bc2"></div>
        </div>
        <div class="perf-bottom"></div>
      </div>
    </div>
  </div>

  <div class="info">Admitted on <em>June 10, 2026</em></div>
</div>

<script>
document.querySelectorAll('.barcode').forEach(bc=>{[10,14,18,8,20,12,16,8,22,10,18,12,6,20,14,16,8,22,12,18,10,14,20,8,16,12,22,10,18,14,6,20,12,16,8,22,14,18,10].forEach(h=>{const s=document.createElement('span');s.style.height=h+'px';bc.appendChild(s)})});

function stamp(el,idx){
  document.querySelectorAll('#tickets .ticket-wrap').forEach((t,i)=>{
    t.classList.remove('active');t.querySelector('.ticket-inner').style.background='#1f1f38';
    t.querySelector('.ticket-content').style.borderColor='#2d2d4a';
    t.querySelector('.ticket-no').style.color='#3a3a50';
    t.querySelector('.ticket-action').style.color='#4a4a6a';
    t.querySelector('.ticket-meta').style.color='#3a3a50';
    const ic=t.querySelector('.ticket-icon');ic.style.background='#1a1a30';ic.style.borderColor='#2a2a42';ic.style.boxShadow='none';
    ic.querySelectorAll('svg *').forEach(p=>{
      if(p.getAttribute('stroke')&&p.getAttribute('stroke')!=='none')p.setAttribute('stroke','#4a4a6a');
      if(p.getAttribute('fill')&&p.getAttribute('fill')!=='none')p.setAttribute('fill','#4a4a6a');
    });
    t.querySelector('.barcode').style.opacity='.15';t.style.zIndex=''
  });
  el.classList.add('active');el.style.zIndex='2';
  el.querySelector('.ticket-inner').style.background='#1a2a32';
  el.querySelector('.ticket-content').style.borderColor='rgba(13,148,136,.4)';
  el.querySelector('.ticket-no').style.color='#0d9488';
  el.querySelector('.ticket-action').style.color='#0d9488';
  el.querySelector('.ticket-meta').style.color='#0d9488';
  const ic=el.querySelector('.ticket-icon');ic.style.background='linear-gradient(135deg,#0d9488,#0f766e)';ic.style.borderColor='#0d9488';ic.style.boxShadow='0 0 20px rgba(13,148,136,.35)';
  ic.querySelectorAll('svg *').forEach(p=>{
    if(p.getAttribute('stroke')&&p.getAttribute('stroke')!=='none')p.setAttribute('stroke','#fff');
    if(p.getAttribute('fill')&&p.getAttribute('fill')!=='none')p.setAttribute('fill','#fff');
  });
  el.querySelector('.barcode').style.opacity='.4'
}
</script>
</body>
</html>
