<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Var 3 — Icon Cards · Seriez Tracking</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .card {
    max-width: 480px; width: 100%;
    background: #141428;
    border-radius: 16px;
    padding: 2rem;
    border: 1px solid #1e1e3a;
  }
  .poster {
    width: 100%; aspect-ratio: 16/9;
    background: linear-gradient(135deg, #1a1a3e 0%, #0d1b2a 100%);
    border-radius: 12px; margin-bottom: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    color: #2d2d5a; font-size: 3rem;
    border: 1px solid #1e1e3a;
  }
  .title { font-size: 1.3rem; font-weight: 700; margin-bottom: .25rem; }
  .meta { font-size: .8rem; color: #6b7280; margin-bottom: 1.5rem; }

  /* ── ICON CARDS ── */
  .icon-cards {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .icon-card {
    all: unset;
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; padding: 14px 8px;
    border-radius: 14px;
    cursor: pointer;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    border: 1px solid #1e1e3a;
    background: #1a1a2e;
    color: #6b7280;
  }
  .icon-card svg {
    width: 28px; height: 28px;
    transition: all .25s cubic-bezier(.4,0,.2,1);
  }
  .icon-card .label-text {
    font-size: .68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    transition: color .25s;
  }
  .icon-card.active {
    background: linear-gradient(135deg, #0d9488, #0f766e);
    border-color: #0d9488;
    color: #fff;
    box-shadow: 0 4px 16px rgba(13,148,136,.3);
    transform: translateY(-2px);
  }
  .icon-card:not(.active):hover {
    border-color: #2d2d5a;
    background: #1e1e36;
    color: #a0a0b8;
  }
  .icon-card .badge {
    display: none;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #fff;
    position: absolute; top: 8px; right: 8px;
  }
  .icon-card.active .badge { display: block; }

  .watched-at {
    margin-top: .6rem;
    font-size: .72rem;
    color: #0d9488;
    display: flex; align-items: center; gap: 4px;
  }
  .label { font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; margin-bottom: .5rem; }
</style>
</head>
<body>
<div class="card">
  <div class="poster">🎬</div>
  <div class="title">The Dark Knight</div>
  <div class="meta">2008 · Action, Crime, Drama · 2h 32m</div>

  <div class="label">Track</div>
  <div class="icon-cards" id="cards1">
    <button class="icon-card" data-status="plan_to_watch" style="position:relative">
      <span class="badge"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="label-text">To Watch</span>
    </button>
    <button class="icon-card" data-status="watching" style="position:relative">
      <span class="badge"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span class="label-text">Watching</span>
    </button>
    <button class="icon-card active" data-status="completed" style="position:relative">
      <span class="badge"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="20 6 9 17 4 12"/></svg>
      <span class="label-text">Watched</span>
    </button>
  </div>
  <div class="watched-at">✓ Watched Jun 10, 2026</div>
</div>

<script>
document.querySelectorAll('#cards1 .icon-card').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#cards1 .icon-card').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>
</body>
</html>
