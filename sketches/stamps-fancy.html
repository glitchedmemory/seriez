<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seriez · Journal Stamps — Fancy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=IM+Fell+English:ital@0;1&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0a0a14; color: #e0e0e0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .page {
    background: #141428;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    border: 1px solid #1e1e3a;
    max-width: 500px; width: 100%;
    position: relative;
    box-shadow: 0 0 80px rgba(13,148,136,.04);
    /* paper texture */
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(13,148,136,.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(236,72,153,.02) 0%, transparent 50%);
  }
  .page::before {
    content: '';
    position: absolute; inset: 0; border-radius: 20px;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.003) 2px, rgba(255,255,255,.003) 4px);
    pointer-events: none;
  }

  .poster {
    width: 100%; aspect-ratio: 16/9;
    background: linear-gradient(135deg, #0d1b2a 0%, #1a1a3e 100%);
    border-radius: 14px; margin-bottom: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    color: #2d2d5a; font-size: 2.5rem;
    border: 2px solid #1e1e3a;
    position: relative; overflow: hidden;
  }
  .poster::after {
    content: '🎬';
    position: absolute;
    opacity: .3;
  }

  .title-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: .2rem; }
  .title { font-size: 1.3rem; font-weight: 700; color: #f0f0f0; }
  .year { font-size: .85rem; color: #6b7280; }
  .meta { font-size: .72rem; color: #5b6270; margin-bottom: 2rem; letter-spacing: .02em; }

  .stamp-section { position: relative; }
  .stamp-label {
    font-family: 'IM Fell English', serif;
    font-size: .68rem; color: #5b6270;
    text-transform: uppercase; letter-spacing: .12em;
    margin-bottom: .8rem;
    font-style: italic;
  }

  /* ── STAMPS ROW ── */
  .stamps {
    display: flex; gap: 14px; justify-content: center;
    position: relative;
  }

  .stamp {
    all: unset;
    flex: 1; max-width: 130px;
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 12px 14px;
    cursor: pointer;
    position: relative;
    transition: all .4s cubic-bezier(.4,0,.2,1);
    /* Stamp border — jagged/irregular feel via mask */
    border-radius: 8px;
    background: rgba(255,255,255,.015);
    border: 2px dashed #2a2a42;
    --ink: transparent;
  }
  .stamp::before {
    content: '';
    position: absolute; inset: 6px;
    border-radius: 4px;
    border: 1px dashed rgba(255,255,255,.04);
    pointer-events: none;
    transition: border-color .4s;
  }
  .stamp:hover { border-color: #3d3d5a; background: rgba(255,255,255,.03); }

  /* ── stamp icon area ── */
  .stamp-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a30;
    border: 2px solid #2a2a42;
    margin-bottom: 10px;
    transition: all .4s cubic-bezier(.4,0,.2,1.2);
    position: relative;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: #4a4a6a;
  }
  /* decorative ring */
  .stamp-icon::after {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px dashed transparent;
    transition: all .5s;
  }

  .stamp-text {
    font-family: 'IM Fell English', serif;
    font-size: .62rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: #4a4a6a;
    transition: color .4s;
  }
  .stamp-sub {
    font-size: .5rem;
    font-style: italic;
    color: #3a3a52;
    margin-top: 2px;
    transition: color .4s;
    font-family: 'IM Fell English', serif;
  }

  /* ── ACTIVE STATE ── */
  .stamp.active {
    border-color: #0d9488;
    border-style: solid;
    background: rgba(13,148,136,.06);
    transform: rotate(-1.5deg) scale(1.03);
    box-shadow: 0 8px 30px rgba(13,148,136,.12);
    z-index: 2;
  }
  .stamp.active::before {
    border-color: rgba(13,148,136,.2);
  }
  .stamp.active .stamp-icon {
    background: linear-gradient(135deg, #0d9488, #0f766e);
    border-color: #0d9488;
    color: #fff;
    box-shadow: 0 0 24px rgba(13,148,136,.35), inset 0 2px 0 rgba(255,255,255,.2);
    transform: scale(1.08);
  }
  .stamp.active .stamp-icon::after {
    border-color: rgba(13,148,136,.3);
    animation: ringPulse 2s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100% { transform: scale(1); opacity: .3; }
    50% { transform: scale(1.12); opacity: .05; }
  }
  .stamp.active .stamp-text { color: #0d9488; }
  .stamp.active .stamp-sub { color: rgba(13,148,136,.7); }

  /* ── CANCELLATION MARK (postal style) ── */
  .cancel-mark {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%) rotate(-10deg) scale(0);
    pointer-events: none; z-index: 3;
    width: 80px; height: 80px;
    border: 2.5px solid rgba(13,148,136,.0);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all .5s cubic-bezier(.4,0,.2,1.5);
    font-family: 'IM Fell English', serif;
    font-size: .48rem;
    color: transparent;
    letter-spacing: .08em;
    white-space: nowrap;
  }
  .stamp.active .cancel-mark {
    transform: translate(-50%,-50%) rotate(-10deg) scale(1);
    border-color: rgba(13,148,136,.2);
    color: rgba(13,148,136,.5);
  }
  .cancel-mark span {
    position: absolute;
    text-transform: uppercase;
  }
  /* wavy cancellation lines */
  .cancel-lines {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%) rotate(-14deg) scale(0);
    pointer-events: none; z-index: 3;
    transition: all .5s cubic-bezier(.4,0,.2,1.5) .1s;
    opacity: 0;
  }
  .stamp.active .cancel-lines {
    transform: translate(-50%,-50%) rotate(-14deg) scale(1);
    opacity: .25;
  }
  .cancel-lines svg { width: 100px; height: 20px; }

  /* ── timestamp ── */
  .stamp-date {
    margin-top: 1.2rem;
    font-family: 'IM Fell English', serif;
    font-size: .65rem;
    font-style: italic;
    color: #5b6270;
    text-align: center;
  }
  .stamp-date em { color: #0d9488; font-style: normal; }
</style>
</head>
<body>
<div class="page">
  <div class="poster"></div>
  <div class="title-row">
    <span class="title">The Dark Knight</span>
    <span class="year">2008</span>
  </div>
  <div class="meta">Action · Crime · Drama · 2h 32m</div>

  <div class="stamp-section">
    <div class="stamp-label">Press &amp; seal</div>
    <div class="stamps" id="stamps">
      <!-- To Watch -->
      <button class="stamp" data-status="plan_to_watch" onclick="setStamp(this)">
        <div class="stamp-icon">w</div>
        <div class="stamp-text">To Watch</div>
        <div class="stamp-sub">add to journal</div>
        <div class="cancel-mark"><span>saved</span></div>
        <div class="cancel-lines">
          <svg viewBox="0 0 100 20"><path d="M0 10 Q10 3 20 10 Q30 17 40 10 Q50 3 60 10 Q70 17 80 10 Q90 3 100 10" fill="none" stroke="#0d9488" stroke-width="1.5"/></svg>
        </div>
      </button>
      <!-- Watching -->
      <button class="stamp" data-status="watching" onclick="setStamp(this)">
        <div class="stamp-icon">▶</div>
        <div class="stamp-text">Watching</div>
        <div class="stamp-sub">in progress</div>
        <div class="cancel-mark"><span>ongoing</span></div>
        <div class="cancel-lines">
          <svg viewBox="0 0 100 20"><path d="M0 10 Q10 3 20 10 Q30 17 40 10 Q50 3 60 10 Q70 17 80 10 Q90 3 100 10" fill="none" stroke="#0d9488" stroke-width="1.5"/></svg>
        </div>
      </button>
      <!-- Watched -->
      <button class="stamp active" data-status="completed" onclick="setStamp(this)">
        <div class="stamp-icon">✔</div>
        <div class="stamp-text">Watched</div>
        <div class="stamp-sub">completed</div>
        <div class="cancel-mark"><span>certified</span></div>
        <div class="cancel-lines">
          <svg viewBox="0 0 100 20"><path d="M0 10 Q10 3 20 10 Q30 17 40 10 Q50 3 60 10 Q70 17 80 10 Q90 3 100 10" fill="none" stroke="#0d9488" stroke-width="1.5"/></svg>
        </div>
      </button>
    </div>
    <div class="stamp-date">Certified on <em>June 10, 2026</em></div>
  </div>
</div>

<script>
function setStamp(el) {
  document.querySelectorAll('#stamps .stamp').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
